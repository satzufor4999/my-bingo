<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Pro - 极简美学版</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        :root {
            /* 默认晴空蓝主题 */
            --primary: #74b9ff;
            --primary-glow: rgba(116, 185, 255, 0.5);
            --bg-gradient: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
            --glass: rgba(255, 255, 255, 0.7);
            --text: #2d3436;
        }

        /* 主题方案定义 */
        body.theme-pink { --primary: #ffb7b2; --primary-glow: rgba(255, 183, 178, 0.5); --bg-gradient: linear-gradient(135deg, #fff1f0 0%, #fff5f5 100%); }
        body.theme-green { --primary: #b2e2f2; --primary-glow: rgba(178, 226, 242, 0.5); --bg-gradient: linear-gradient(135deg, #e6fffa 0%, #f0fff4 100%); }
        body.theme-purple { --primary: #d1d1f7; --primary-glow: rgba(209, 209, 247, 0.5); --bg-gradient: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%); }

        * { box-sizing: border-box; transition: background 0.4s ease, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        body {
            font-family: 'PingFang SC', 'Inter', system-ui, sans-serif;
            margin: 0; padding: 0; min-height: 100vh;
            background: var(--bg-gradient);
            color: var(--text); overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* 1. 悬浮标题栏 */
        header {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 1200px; z-index: 100;
            background: var(--glass); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.4); border-radius: 20px;
            padding: 12px 30px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.05);
        }

        .logo { font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; color: var(--dark); }

        /* 2. 布局结构 */
        main {
            margin-top: 100px; display: flex; flex: 1;
            padding: 20px; gap: 20px; max-width: 1400px; width: 100%; align-self: center;
        }

        /* 左侧任务池 */
        .pool-side {
            flex: 0 0 300px; display: flex; flex-direction: column; gap: 15px;
        }

        /* 中间棋盘 */
        .grid-side {
            flex: 1; display: flex; justify-content: center; align-items: flex-start;
        }

        /* 右侧成就/设置 */
        .status-side {
            flex: 0 0 280px; display: flex; flex-direction: column; gap: 20px;
        }

        /* 3. Bingo格子与小球视觉 */
        .bingo-board {
            display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 12px; background: var(--glass); backdrop-filter: blur(8px);
            padding: 15px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            width: 100%; max-width: 550px; aspect-ratio: 1;
        }

        .bingo-cell {
            background: rgba(255, 255, 255, 0.4); border-radius: 18px;
            border: 2px dashed rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: center;
            position: relative; overflow: visible;
        }

        /* 任务小球样式 */
        .task-item {
            width: 85%; height: 85%; border-radius: 50px; 
            background: white; border: 1px solid rgba(0,0,0,0.05);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; font-weight: 600; text-align: center; padding: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: grab;
            position: relative; z-index: 2;
        }

        .bingo-cell .task-item {
            width: 90%; height: 90%; background: var(--primary); color: white;
            box-shadow: 0 10px 20px var(--primary-glow); border: none; cursor: pointer;
        }

        /* 打卡点亮效果 */
        .task-item.checked-in {
            background: #2ecc71 !important; color: white;
            box-shadow: 0 0 25px rgba(46, 204, 113, 0.6);
            transform: scale(0.92);
        }

        .bingo-cell.lit::after {
            content: ''; position: absolute; inset: -5px; border-radius: 22px;
            background: var(--primary-glow); filter: blur(10px); z-index: -1;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 0.8; } 100% { opacity: 0.5; } }

        /* 4. 成就与设置栏 */
        .card {
            background: var(--glass); backdrop-filter: blur(12px);
            border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.4);
        }

        .progress-circle {
            width: 80px; height: 80px; border-radius: 50%;
            background: conic-gradient(var(--primary) calc(var(--p) * 1%), #eee 0);
            display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;
        }
        .progress-circle::after {
            content: attr(data-label); width: 65px; height: 65px; background: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800;
        }

        .medal-slot { font-size: 2rem; text-align: center; margin-top: 10px; }

        .theme-picker { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
        .theme-dot {
            width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
            border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* 5. 分类标签 */
        .tabs-container { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; }
        .tab {
            padding: 6px 12px; background: rgba(255,255,255,0.5); border-radius: 10px;
            font-size: 0.8rem; cursor: pointer; white-space: nowrap; border: 1px solid transparent;
        }
        .tab.active { background: var(--primary); color: white; font-weight: bold; }

        /* 拖拽缩放动画 */
        .sortable-ghost { opacity: 0; }
        .sortable-drag { transform: scale(1.1) rotate(5deg); opacity: 0.9; }

        /* 粒子画布 */
        #particle-canvas {
            position: fixed; pointer-events: none; z-index: 999; top: 0; left: 0;
        }

        .btn-action {
            padding: 8px 15px; border-radius: 12px; border: none; background: var(--primary);
            color: white; font-weight: bold; cursor: pointer; font-size: 0.8rem;
        }
    </style>
</head>
<body class="theme-blue">

    <canvas id="particle-canvas"></canvas>

    <header>
        <div class="logo">BINGO ✨ PRO</div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-action" onclick="randomChallenge()">🎲 随机挑战</button>
            <button class="btn-action" style="background:#95a5a6" onclick="recallAll()">🔙 撤回</button>
        </div>
    </header>

    <main>
        <div class="pool-side">
            <div class="card" style="flex: 1; display: flex; flex-direction: column;">
                <div class="tabs-container" id="tabs-header">
                    <div class="tab" onclick="addNewCategory()">+</div>
                </div>
                <div id="pool-wrapper" style="flex: 1; position: relative; margin-top: 10px;"></div>
            </div>
        </div>

        <div class="grid-side">
            <div class="bingo-board" id="bingo-board"></div>
        </div>

        <div class="status-side">
            <div class="card">
                <h4 style="margin: 0 0 15px 0; text-align: center;">完成进度</h4>
                <div class="progress-circle" id="prog-circle" style="--p: 0" data-label="0%"></div>
                <div class="medal-slot" id="medal-slot">🧊</div>
            </div>

            <div class="card">
                <h4 style="margin: 0 0 15px 0; text-align: center;">主题风格</h4>
                <div class="theme-picker">
                    <div class="theme-dot" style="background: #74b9ff;" onclick="setTheme('blue')"></div>
                    <div class="theme-dot" style="background: #ffb7b2;" onclick="setTheme('pink')"></div>
                    <div class="theme-dot" style="background: #b2e2f2;" onclick="setTheme('green')"></div>
                    <div class="theme-dot" style="background: #d1d1f7;" onclick="setTheme('purple')"></div>
                </div>
            </div>
        </div>
    </main>

<script>
    // --- 核心逻辑与数据 ---
    let state = {
        theme: 'blue',
        categories: [
            { id: 'c1', name: '🌿 日常', tasks: ['早起喝水', '伸个懒腰', '整理床铺', '阅读10分钟', '深呼吸', '水果时间'] },
            { id: 'c2', name: '💻 工作', tasks: ['清理邮件', '番茄钟*1', '记录灵感', '站立办公', '复盘计划'] }
        ],
        grid: Array(25).fill(null),
        activeTabId: 'c1'
    };

    // 本地存储还原
    const saved = localStorage.getItem('bingo_aesthetic_v1');
    if (saved) state = JSON.parse(saved);

    function save() { 
        localStorage.setItem('bingo_aesthetic_v1', JSON.stringify(state)); 
        updateUI();
    }

    // --- 初始化 UI ---
    function init() {
        setTheme(state.theme);
        renderTabs();
        renderPools();
        renderGrid();
        updateUI();
    }

    function setTheme(t) {
        document.body.className = 'theme-' + t;
        state.theme = t;
        save();
    }

    function renderTabs() {
        const header = document.getElementById('tabs-header');
        header.querySelectorAll('.tab:not(:last-child)').forEach(n => n.remove());
        state.categories.forEach(cat => {
            const el = document.createElement('div');
            el.className = `tab ${cat.id === state.activeTabId ? 'active' : ''}`;
            el.textContent = cat.name;
            el.onclick = () => { state.activeTabId = cat.id; renderTabs(); renderPools(); };
            el.ondblclick = () => { 
                const n = prompt("重命名:", cat.name); 
                if(n) { cat.name = n; renderTabs(); save(); } 
            };
            header.insertBefore(el, header.lastElementChild);
        });
    }

    function renderPools() {
        const wrapper = document.getElementById('pool-wrapper');
        wrapper.innerHTML = '';
        state.categories.forEach(cat => {
            const pool = document.createElement('div');
            pool.id = 'pool-' + cat.id;
            pool.style.display = (cat.id === state.activeTabId) ? 'flex' : 'none';
            pool.style.flexDirection = 'column';
            pool.style.gap = '10px';
            
            cat.tasks.forEach(t => {
                if (!state.grid.some(g => g && g.text === t && g.origin === cat.id)) {
                    pool.appendChild(createTaskEl(t, cat.id));
                }
            });
            wrapper.appendChild(pool);

            Sortable.create(pool, {
                group: 'bingo', animation: 200,
                onAdd: (e) => { e.item.classList.remove('checked-in'); syncState(); }
            });
        });
    }

    function renderGrid() {
        const board = document.getElementById('bingo-board');
        board.innerHTML = '';
        for (let i = 0; i < 25; i++) {
            const cell = document.createElement('div');
            cell.className = 'bingo-cell';
            const data = state.grid[i];
            if (data) {
                const item = createTaskEl(data.text, data.origin);
                if (data.checked) {
                    item.classList.add('checked-in');
                    cell.classList.add('lit');
                }
                cell.appendChild(item);
            }
            board.appendChild(cell);

            Sortable.create(cell, {
                group: 'bingo', animation: 200,
                onAdd: (e) => {
                    const pool = document.getElementById('pool-' + e.item.dataset.origin);
                    Array.from(cell.children).forEach(child => {
                        if (child !== e.item) pool.appendChild(child);
                    });
                    syncState();
                },
                onRemove: syncState
            });
        }
    }

    function createTaskEl(text, originId) {
        const div = document.createElement('div');
        div.className = 'task-item';
        div.textContent = text;
        div.dataset.origin = originId;
        div.onclick = (e) => {
            if (div.parentElement.classList.contains('bingo-cell')) {
                const isChecking = !div.classList.contains('checked-in');
                div.classList.toggle('checked-in');
                div.parentElement.classList.toggle('lit');
                if (isChecking) createParticles(e.clientX, e.clientY);
                syncState();
            }
        };
        return div;
    }

    function syncState() {
        const cells = document.querySelectorAll('.bingo-cell');
        state.grid = Array.from(cells).map(c => {
            const it = c.querySelector('.task-item');
            return it ? { text: it.textContent, origin: it.dataset.origin, checked: it.classList.contains('checked-in') } : null;
        });
        save();
    }

    function updateUI() {
        const total = 25;
        const done = state.grid.filter(g => g && g.checked).length;
        const percent = Math.floor((done / total) * 100);
        
        const circle = document.getElementById('prog-circle');
        circle.style.setProperty('--p', percent);
        circle.dataset.label = percent + '%';

        const medal = document.getElementById('medal-slot');
        if (percent === 100) medal.textContent = '👑';
        else if (percent > 70) medal.textContent = '🏆';
        else if (percent > 30) medal.textContent = '🥇';
        else medal.textContent = '🧊';
    }

    function recallAll() {
        state.grid = Array(25).fill(null);
        renderPools();
        renderGrid();
        save();
    }

    function randomChallenge() {
        recallAll();
        let all = [];
        state.categories.forEach(c => {
            const p = document.getElementById('pool-' + c.id);
            Array.from(p.children).forEach(el => all.push(el));
        });
        all.sort(() => Math.random() - 0.5);
        const cells = document.querySelectorAll('.bingo-cell');
        for (let i = 0; i < Math.min(all.length, 25); i++) {
            cells[i].appendChild(all[i]);
        }
        syncState();
    }

    function addNewCategory() {
        const n = prompt("分类名:");
        if(n) { 
            state.categories.push({ id: 'c'+Date.now(), name: '📁 '+n, tasks: ['新任务'] });
            save(); location.reload();
        }
    }

    // --- 粒子特效 ---
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function createParticles(x, y) {
        for (let i = 0; i < 20; i++) {
            particles.push({
                x, y,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.5) * 10,
                size: Math.random() * 5 + 2,
                color: getComputedStyle(document.body).getPropertyValue('--primary'),
                life: 1
            });
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach((p, i) => {
            p.life -= 0.02;
            p.x += p.vx; p.y += p.vy; p.vy += 0.2;
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
            if (p.life <= 0) particles.splice(i, 1);
        });
        requestAnimationFrame(animate);
    }
    animate();

    init();
</script>
</body>
</html>
