<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>人类丰荣计划</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.9); }
        body { background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); min-height: 100vh; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.7); border-radius: 28px; box-shadow: 0 12px 40px rgba(0,0,0,0.03); }
        .bingo-cell { aspect-ratio: 1/1; border-radius: 20px; cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; justify-content: center; text-align: center; padding: 12px; font-size: 0.85rem; background: white; border: 2px solid transparent; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .bingo-cell.active { background: #e0f2fe; color: #0369a1; font-weight: 800; transform: scale(0.94); box-shadow: inset 0 4px 12px rgba(0,0,0,0.06); }
        .bingo-cell.active::after { content: "✨"; position: absolute; top: 4px; right: 4px; font-size: 10px; }
        .header-float { position: sticky; top: 15px; z-index: 1000; width: 100%; max-width: 980px; }
        .tag-item { display: inline-flex; align-items: center; padding: 12px 20px; border-radius: 16px; background: white; margin: 6px; font-size: 14px; cursor: grab; border: 1px solid #f0f0f0; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .del-marker { position: absolute; top: -10px; right: -10px; background: #ff4757; color: white; width: 22px; height: 22px; border-radius: 50%; font-size: 14px; display: none; align-items: center; justify-content: center; cursor: pointer; border: 2px solid white; }
        .tag-item.edit-mode { animation: wiggle 0.3s infinite; border-color: #ff4757; }
        .tag-item.edit-mode .del-marker { display: flex; }
        @keyframes wiggle { 0%, 100% { transform: rotate(-1deg); } 50% { transform: rotate(1deg); } }
        .sortable-ghost { opacity: 0.1; transform: scale(0.8); }
        .achieve-card { opacity: 0.2; grayscale: 100%; transition: 0.8s all; transform: scale(0.95); }
        .achieve-card.lit { opacity: 1; grayscale: 0%; transform: scale(1); border-color: #fbbf24; background: #fffbeb; }
    </style>
</head>
<body class="p-4 md:p-10 text-slate-700" onclick="exitEditMode()">

    <div class="header-float mx-auto glass p-8 mb-10 flex flex-col md:flex-row justify-between items-center gap-6">
        <div>
            <h1 class="text-3xl font-black tracking-tight text-slate-900">🌿 人类丰荣计划</h1>
            <p id="cur-date" class="text-xs text-slate-400 mt-2 font-mono tracking-tighter uppercase"></p>
        </div>
        <div class="flex items-center gap-12">
            <div class="text-center">
                <div class="text-[10px] text-slate-400 mb-1 uppercase tracking-widest">今日进度</div>
                <div id="prog-val" class="text-3xl font-black text-blue-600">0%</div>
            </div>
            <div class="text-center border-l border-slate-200 pl-12">
                <div class="text-[10px] text-slate-400 mb-1 uppercase tracking-widest">Bingo 条数</div>
                <div id="bingo-val" class="text-3xl font-black text-orange-500">0</div>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-8 space-y-8">
            <div class="glass p-6 flex flex-wrap items-center justify-between gap-6">
                <div class="flex items-center gap-4">
                    <span class="text-xs font-black text-slate-400">SIZE</span>
                    <select id="sizeSel" onchange="handleSizeChange()" class="bg-slate-100 px-4 py-2 rounded-xl text-sm font-bold border-none outline-none">
                        <option value="4x4">4 x 4</option>
                        <option value="5x5" selected>5 x 5</option>
                    </select>
                </div>
                <div class="flex gap-3">
                    <button onclick="doRandomFill()" class="px-6 py-3 bg-blue-600 text-white rounded-2xl text-sm font-black shadow-xl shadow-blue-200">🎲 随机挑战</button>
                    <button onclick="doClearCheck()" class="px-6 py-3 bg-white text-slate-600 rounded-2xl text-sm font-black border">🧹 清空打卡</button>
                    <button onclick="doResetBoard()" class="px-6 py-3 bg-slate-100 text-slate-400 rounded-2xl text-sm font-black">🗑️ 重置</button>
                </div>
            </div>

            <div id="bingo-grid" class="grid gap-4 p-6 rounded-[40px] bg-slate-200/20 shadow-inner"></div>

            <div class="glass p-8">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-xl font-bold">📥 任务存储池</h2>
                    <span class="text-[10px] text-slate-400 font-bold tracking-widest uppercase">Long press to delete</span>
                </div>
                <div class="flex gap-4 mb-8">
                    <input id="tagIn" type="text" placeholder="发现新的丰荣方式..." class="flex-1 px-6 py-4 rounded-2xl border-none ring-1 ring-slate-100 focus:ring-2 focus:ring-blue-400 transition-all outline-none text-sm bg-white/50">
                    <button onclick="doAddTag()" class="bg-slate-900 text-white px-10 rounded-2xl font-black text-sm">添加</button>
                </div>
                <div id="tag-pool" class="flex flex-wrap min-h-[180px] p-6 bg-white/40 rounded-[30px] border-2 border-dashed border-slate-200"></div>
            </div>
        </div>

        <div class="lg:col-span-4 space-y-8">
            <div class="glass p-8">
                <h2 class="font-black text-slate-800 mb-6 flex items-center gap-2">📊 数据统计</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-5 bg-white rounded-3xl border border-slate-100 shadow-sm text-center">
                        <div class="text-[10px] text-slate-300 font-bold uppercase">坚持天数</div>
                        <div id="stat-d" class="text-3xl font-black mt-1">1</div>
                    </div>
                    <div class="p-5 bg-white rounded-3xl border border-slate-100 shadow-sm text-center">
                        <div class="text-[10px] text-slate-300 font-bold uppercase">完美天数</div>
                        <div id="stat-p" class="text-3xl font-black mt-1">0</div>
                    </div>
                </div>
            </div>

            <div class="glass p-8">
                <h2 class="font-black text-slate-800 mb-6 border-b pb-4">🏆 获得成就</h2>
                <div class="grid grid-cols-2 gap-4" id="ach-box">
                    <div id="m-1" class="achieve-card flex flex-col items-center p-4 rounded-3xl bg-white border"><span class="text-3xl mb-1">🌱</span><span class="text-[10px] font-bold">首条连线</span></div>
                    <div id="m-3" class="achieve-card flex flex-col items-center p-4 rounded-3xl bg-white border"><span class="text-3xl mb-1">⚡</span><span class="text-[10px] font-bold">三线并进</span></div>
                    <div id="m-7" class="achieve-card flex flex-col items-center p-4 rounded-3xl bg-white border"><span class="text-3xl mb-1">🔥</span><span class="text-[10px] font-bold">七日连续</span></div>
                    <div id="m-win" class="achieve-card flex flex-col items-center p-4 rounded-3xl bg-white border"><span class="text-3xl mb-1">👑</span><span class="text-[10px] font-bold">完美收官</span></div>
                </div>
            </div>
        </div>
    </div>

    <div id="win-ui" onclick="this.style.display='none'" class="fixed inset-0 bg-white/95 z-[5000] hidden flex-col items-center justify-center cursor-pointer animate-in fade-in duration-700">
        <div class="text-[150px] mb-8 animate-bounce">🏆</div>
        <h2 class="text-5xl font-black text-slate-900 tracking-tighter">完全达成！</h2>
        <p class="text-slate-400 mt-6 font-bold tracking-[0.4em]">YOU ARE BLOOMING</p>
    </div>

    <script>
        let db = {
            grid: JSON.parse(localStorage.getItem('fe_g')) || Array(25).fill(""),
            active: JSON.parse(localStorage.getItem('fe_a')) || [],
            pool: JSON.parse(localStorage.getItem('fe_p')) || ["听一张专辑", "涂抹喜欢的香水", "对镜子微笑", "深度拉伸5分钟", "阅读10页书", "写3件感恩的事", "赤脚踩草地", "整理桌面", "发呆10分钟", "给朋友发信息", "喝足1.5L水", "学习冷知识", "给植物浇水", "早睡30分钟", "静心练字", "拍一张生活照", "远眺5分钟", "放下手机吃饭", "洗一个热水澡", "修剪指甲", "换一套舒服床单", "喝一杯热茶", "听雨声/白噪音", "冥想深呼吸", "奖励自己礼物"],
            stats: JSON.parse(localStorage.getItem('fe_s')) || { days: 1, perfect: 0, lastDate: new Date().toLocaleDateString(), bingos: 0 }
        };

        const save = () => { localStorage.setItem('fe_g', JSON.stringify(db.grid)); localStorage.setItem('fe_a', JSON.stringify(db.active)); localStorage.setItem('fe_p', JSON.stringify(db.pool)); localStorage.setItem('fe_s', JSON.stringify(db.stats)); };

        const init = () => {
            renderGrid(); renderPool(); syncDashboard();
            if(db.stats.lastDate !== new Date().toLocaleDateString()) { db.stats.days++; db.stats.lastDate = new Date().toLocaleDateString(); save(); }
        };

        function renderGrid() {
            const el = document.getElementById('bingo-grid'); const size = parseInt(document.getElementById('sizeSel').value[0]);
            el.style.gridTemplateColumns = `repeat(${size}, 1fr)`; el.innerHTML = '';
            db.grid.slice(0, size*size).forEach((txt, i) => {
                const cell = document.createElement('div'); cell.className = `bingo-cell ${db.active.includes(i) ? 'active' : ''}`;
                cell.innerHTML = txt ? `<span>${txt}</span>` : `<span class="text-slate-100 text-[10px] font-black uppercase">Empty</span>`;
                cell.onclick = (e) => { e.stopPropagation(); if(txt) toggleCell(i); }; el.appendChild(cell);
            });
            new Sortable(el, { group: 'fe', animation: 300, swap: true, invertedSwapThreshold: 0.6, onEnd: syncFromDOM });
        }

        function renderPool() {
            const el = document.getElementById('tag-pool'); el.innerHTML = '';
            db.pool.forEach((txt, i) => {
                const tag = document.createElement('div'); tag.className = 'tag-item';
                tag.innerHTML = `${txt}<div class="del-marker" onclick="doDelTag(${i}, event)">×</div>`;
                let t; const start = () => t = setTimeout(() => tag.classList.add('edit-mode'), 600); const stop = () => clearTimeout(t);
                tag.addEventListener('touchstart', start); tag.addEventListener('touchend', stop);
                tag.addEventListener('mousedown', start); tag.addEventListener('mouseup', stop);
                el.appendChild(tag);
            });
            new Sortable(el, { group: 'fe', animation: 300, onEnd: syncFromDOM });
        }

        function syncFromDOM() {
            const gridEls = document.querySelectorAll('#bingo-grid .bingo-cell');
            db.grid = Array.from(gridEls).map(el => el.innerText.replace('×', '').replace('EMPTY', '').trim());
            const poolEls = document.querySelectorAll('#tag-pool .tag-item');
            db.pool = Array.from(poolEls).map(el => el.innerText.replace('×', '').trim());
            save(); renderGrid();
        }

        function toggleCell(idx) {
            const p = db.active.indexOf(idx);
            if(p > -1) db.active.splice(p, 1);
            else { db.active.push(idx); setTimeout(detectBingo, 200); }
            save(); renderGrid(); syncDashboard();
        }

        function detectBingo() {
            const size = parseInt(document.getElementById('sizeSel').value[0]);
            let count = 0; const act = db.active; const g = db.grid;
            for(let i=0; i<size; i++) {
                let r=[], c=[]; for(let j=0; j<size; j++) { r.push(i*size+j); c.push(j*size+i); }
                if(r.every(idx => act.includes(idx) && g[idx])) count++; if(c.every(idx => act.includes(idx) && g[idx])) count++;
            }
            let d1=[], d2=[]; for(let i=0; i<size; i++) { d1.push(i*size+i); d2.push(i*size+(size-1-i)); }
            if(d1.every(idx => act.includes(idx) && g[idx])) count++; if(d2.every(idx => act.includes(idx) && g[idx])) count++;
            if(count > db.stats.bingos) confetti({ particleCount: 150, spread: 80, origin: { y: 0.8 } });
            db.stats.bingos = count;
            const filled = g.filter(t => t).length;
            if(filled > 0 && act.length === filled) { document.getElementById('win-ui').style.display = 'flex'; db.stats.perfect++; }
            save(); syncDashboard();
        }

        function syncDashboard() {
            const filled = db.grid.filter(t => t).length;
            const prog = filled ? Math.round((db.active.length/filled)*100) : 0;
            document.getElementById('prog-val').innerText = prog + '%';
            document.getElementById('bingo-val').innerText = db.stats.bingos;
            document.getElementById('stat-d').innerText = db.stats.days;
            document.getElementById('stat-p').innerText = db.stats.perfect;
            document.getElementById('cur-date').innerText = new Date().toLocaleDateString('zh-CN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            if(db.stats.bingos >= 1) document.getElementById('m-1').classList.add('lit');
            if(db.stats.bingos >= 3) document.getElementById('m-3').classList.add('lit');
            if(db.stats.days >= 7) document.getElementById('m-7').classList.add('lit');
            if(db.stats.perfect >= 1) document.getElementById('m-win').classList.add('lit');
        }

        function doAddTag() { const v = document.getElementById('tagIn').value; if(v) { db.pool.unshift(v); document.getElementById('tagIn').value = ''; save(); init(); } }
        function doDelTag(i, e) { e.stopPropagation(); if(confirm("确定删除吗？")) { db.pool.splice(i,1); save(); init(); } }
        function exitEditMode() { document.querySelectorAll('.tag-item').forEach(el => el.classList.remove('edit-mode')); }
        function doRandomFill() { let s = [...db.pool].sort(() => Math.random() - 0.5); const size = parseInt(document.getElementById('sizeSel').value[0]); db.grid = s.slice(0, size*size); while(db.grid.length < size*size) db.grid.push(""); db.active = []; db.stats.bingos = 0; save(); init(); }
        function doClearCheck() { db.active = []; db.stats.bingos = 0; save(); init(); }
        function doResetBoard() { if(confirm("清除表格内容？")) { db.grid = Array(25).fill(""); db.active = []; db.stats.bingos = 0; save(); init(); } }
        function handleSizeChange() { db.active = []; db.stats.bingos = 0; save(); init(); }

        init();
    </script>
</body>
</html>
