<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高级版人类丰荣</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        .bingo-cell { aspect-ratio: 1/1; cursor: pointer; transition: all 0.2s; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; text-align: center; padding: 5px; position: relative; }
        .bingo-cell.active { background-opacity: 0.8; text-decoration: line-through; filter: brightness(0.9); }
        .edit-mode .bingo-cell { cursor: grab; text-decoration: none !important; }
        .delete-btn { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 12px; display: none; align-items: center; justify-content: center; }
        .edit-mode .delete-btn { display: flex; }
        /* 马卡龙色系 */
        .theme-pink { background-color: #ffeadb; color: #8d5d46; } /* 杏粉 */
        .theme-blue { background-color: #d4f0f0; color: #4a7c7c; } /* 薄荷蓝 */
        .theme-purple { background-color: #e2d5f8; color: #6a5a8a; } /* 薰衣草紫 */
        .theme-green { background-color: #e1f0c4; color: #5a6a3a; } /* 抹茶绿 */
    </style>
</head>
<body class="bg-white min-h-screen flex flex-col items-center py-6 px-4">
    <div class="max-w-md w-full">
        <div class="bg-slate-100 p-4 rounded-2xl mb-6 space-y-4 shadow-sm">
            <div class="flex justify-between items-center">
                <select id="gridSize" onchange="renderBoard()" class="p-2 rounded bg-white border">
                    <option value="4x4">4 x 4 模式</option>
                    <option value="4x5">4 x 5 模式</option>
                    <option value="5x5" selected>5 x 5 模式</option>
                </select>
                <select id="themeSelect" onchange="changeTheme()" class="p-2 rounded bg-white border">
                    <option value="theme-pink">樱花粉</option>
                    <option value="theme-blue">薄荷蓝</option>
                    <option value="theme-purple">风铃紫</option>
                    <option value="theme-green">青草绿</option>
                </select>
            </div>
            
            <div class="flex gap-2">
                <input id="newItem" type="text" placeholder="添加新任务..." class="flex-1 p-2 rounded border">
                <button onclick="addItem()" class="bg-blue-500 text-white px-4 py-2 rounded">添加</button>
            </div>

            <div class="flex justify-between">
                <button onclick="toggleEdit()" id="editBtn" class="text-sm font-bold text-blue-600">进入编辑/拖拽模式</button>
                <button onclick="resetProgress()" class="text-sm text-gray-500">重置勾选</button>
            </div>
        </div>

        <div id="bingo-grid" class="grid gap-2 p-2 rounded-xl shadow-inner bg-gray-50"></div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('myTasks')) || ["晒太阳", "喝足水", "拉伸", "吃水果", "撸猫", "冥想", "阅读", "整理", "深呼吸", "听音乐", "不刷手机吃饭", "早睡", "运动", "写日记", "发消息", "看日落", "洗热水澡", "剪指甲", "换床单", "喝杯茶", "浇花", "发呆", "涂香水", "唱歌", "自由创作"];
        let activeIndices = JSON.parse(localStorage.getItem('activeIndex')) || [];
        let isEditMode = false;
        let sortable;

        function renderBoard() {
            const grid = document.getElementById('bingo-grid');
            const size = document.getElementById('gridSize').value;
            const [cols, rows] = size.split('x').map(Number);
            const theme = document.getElementById('themeSelect').value;
            const total = cols * rows;

            grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            grid.innerHTML = '';

            tasks.slice(0, total).forEach((task, index) => {
                const cell = document.createElement('div');
                cell.className = `bingo-cell rounded-lg shadow-sm ${theme} ${activeIndices.includes(index) ? 'active shadow-none opacity-50' : ''}`;
                cell.innerHTML = `${task} <div class="delete-btn" onclick="deleteItem(${index}, event)">×</div>`;
                
                cell.onclick = () => {
                    if (isEditMode) return;
                    if (activeIndices.includes(index)) {
                        activeIndices = activeIndices.filter(i => i !== index);
                    } else {
                        activeIndices.push(index);
                    }
                    save();
                    renderBoard();
                };
                grid.appendChild(cell);
            });

            // 初始化拖拽
            if (sortable) sortable.destroy();
            sortable = new Sortable(grid, {
                animation: 150,
                disabled: !isEditMode,
                onEnd: (evt) => {
                    const item = tasks.splice(evt.oldIndex, 1)[0];
                    tasks.splice(evt.newIndex, 0, item);
                    save();
                }
            });
        }

        function toggleEdit() {
            isEditMode = !isEditMode;
            document.body.classList.toggle('edit-mode', isEditMode);
            document.getElementById('editBtn').innerText = isEditMode ? "💾 保存排序" : "✏️ 进入编辑/拖拽模式";
            renderBoard();
        }

        function addItem() {
            const input = document.getElementById('newItem');
            if (input.value) {
                tasks.unshift(input.value);
                input.value = '';
                save();
                renderBoard();
            }
        }

        function deleteItem(index, event) {
            event.stopPropagation();
            tasks.splice(index, 1);
            save();
            renderBoard();
        }

        function changeTheme() { save(); renderBoard(); }
        function save() {
            localStorage.setItem('myTasks', JSON.stringify(tasks));
            localStorage.setItem('activeIndex', JSON.stringify(activeIndices));
            localStorage.setItem('myTheme', document.getElementById('themeSelect').value);
            localStorage.setItem('mySize', document.getElementById('gridSize').value);
        }

        function resetProgress() {
            activeIndices = [];
            save();
            renderBoard();
        }

        // 初始化加载保存的配置
        document.getElementById('themeSelect').value = localStorage.getItem('myTheme') || 'theme-pink';
        document.getElementById('gridSize').value = localStorage.getItem('mySize') || '5x5';
        renderBoard();
    </script>
</body>
</html>
