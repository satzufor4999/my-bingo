<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人类丰容计划 - 随机挑战版</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            /* 默认配色 */
            --bg: #fff5f5; --box: #ffffff; --ball: #ffc9c9; --accent: #ff8787; --text: #495057;
        }
        body.theme-mint { --bg: #f4fce3; --box: #ffffff; --ball: #c0eb75; --accent: #82c91e; --text: #373a3c; }
        body.theme-lavender { --bg: #f8f0fc; --box: #ffffff; --ball: #e599f7; --accent: #ae3ec9; --text: #4b4d4f; }
        body.theme-sky { --bg: #e7f5ff; --box: #ffffff; --ball: #74c0fc; --accent: #1c7ed6; --text: #343a40; }

        body { font-family: -apple-system, "Noto Sans SC", sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; min-height: 100vh; transition: 0.3s; }
        
        .sticky-header { 
            position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.9); 
            backdrop-filter: blur(10px); border-bottom: 2px solid var(--ball);
            padding: 15px 30px; display: flex; justify-content: space-between; align-items: center;
        }

        .main-container { display: flex; flex: 1; padding: 20px; gap: 20px; max-width: 1200px; margin: 0 auto; width: 100%; box-sizing: border-box; }

        .content-area { flex: 2; }
        .grid-container { 
            display: grid; gap: 10px; background: var(--box); padding: 15px; 
            border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }
        .bingo-box { 
            aspect-ratio: 1/1; background: var(--bg); border: 2px dashed var(--ball); 
            border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative;
        }
        .bingo-box.active { background: var(--ball); border-style: solid; border-color: var(--accent); }

        .ball { 
            width: 88%; height: 88%; background: #fff; border-radius: 10px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.08); cursor: grab;
            display: flex; align-items: center; justify-content: center; 
            text-align: center; font-size: 13px; font-weight: bold; padding: 5px; box-sizing: border-box;
        }
        .active .ball { background: var(--accent); color: white; border: 2px solid #fff; }

        .side-bar { flex: 0.8; display: flex; flex-direction: column; gap: 20px; }
        .card { background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
        .medal { font-size: 28px; filter: grayscale(1); opacity: 0.2; transition: 0.5s; }
        .medal.unlocked { filter: grayscale(0); opacity: 1; transform: scale(1.1); }

        .tabs { display: flex; gap: 5px; margin-bottom: 0px; overflow-x: auto; }
        .tab { padding: 8px 15px; background: #eee; border-radius: 10px 10px 0 0; cursor: pointer; font-size: 12px; border: none; }
        .tab.active { background: var(--ball); font-weight: bold; }
        
        #tag-pool { 
            background: #fff; border: 2px solid var(--ball); border-radius: 0 15px 15px 15px; 
            padding: 15px; min-height: 120px; display: flex; flex-wrap: wrap; gap: 8px; align-content: flex-start;
        }

        .theme-swatches { display: flex; gap: 10px; margin-top: 10px; }
        .swatch { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; box-shadow: 0 0 5px rgba(0,0,0,0.1); }

        button { 
            border: none; background: var(--ball); color: var(--text); padding: 10px 18px; 
            border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 13px;
        }
        button:hover { background: var(--accent); color: #fff; }
        .btn-outline { background: none; border: 1.5px solid var(--ball); }
        .sortable-ghost { opacity: 0.1; }
    </style>
</head>
<body class="theme-pink">

    <div class="sticky-header">
        <div style="font-size: 22px; font-weight: 900; letter-spacing: -1px;">🌿 人类丰容计划</div>
        <div style="display: flex; gap: 40px; font-weight: bold;">
            <span>完成度: <span id="prog-val" style="color:var(--accent)">0%</span></span>
            <span>连线: <span id="bingo-val" style="color:var(--accent)">0</span></span>
        </div>
        <div style="display: flex; gap: 10px;">
            <button onclick="doRandomChallenge()" style="background: var(--accent); color: white;">🎲 随机挑战</button>
            <button onclick="recallAll()" class="btn-outline">↩️ 全部撤回</button>
        </div>
    </div>

    <div class="main-container">
        <div class="content-area">
            <div style="margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: 14px; font-weight: bold;">我的丰容盒子</span>
                <select id="sizeSel" onchange="handleSizeChange()" style="padding:5px 10px; border-radius:8px; border:1.5px solid var(--ball); outline:none;">
                    <option value="4">4x4 布局</option>
                    <option value="5" selected>5x5 布局</option>
                </select>
            </div>
            <div id="bingo-grid" class="grid-container"></div>
            
            <div style="margin-top: 30px;">
                <div id="sheet-tabs" class="tabs"></div>
                <div id="tag-pool"></div>
                <div style="margin-top: 15px; display: flex; gap: 10px;">
                    <input id="tagIn" type="text" placeholder="发现新的丰容任务..." style="flex:1; padding:12px; border:1.5px solid var(--ball); border-radius:12px; outline:none;">
                    <button onclick="addTag()">投入池子</button>
                    <button onclick="addSheet()" class="btn-outline">新建分类</button>
                </div>
            </div>
        </div>

        <div class="side-bar">
            <div class="card">
                <h4 style="margin:0 0 15px 0; font-size: 14px;">成就勋章</h4>
                <div style="display: flex; justify-content: space-around; padding: 10px 0;">
                    <span id="m1" class="medal" title="获得1条Bingo连线">🥇</span>
                    <span id="m3" class="medal" title="获得3条Bingo连线">🏆</span>
                    <span id="mw" class="medal" title="填满并全部打卡">👑</span>
                </div>
            </div>

            <div class="card">
                <h4 style="margin:0 0 10px 0; font-size: 14px;">切换配色</h4>
                <div class="theme-swatches">
                    <div class="swatch" style="background:#ffc9c9" onclick="setTheme('pink')"></div>
                    <div class="swatch" style="background:#c0eb75" onclick="setTheme('mint')"></div>
                    <div class="swatch" style="background:#e599f7" onclick="setTheme('lavender')"></div>
                    <div class="swatch" style="background:#74c0fc" onclick="setTheme('sky')"></div>
                </div>
            </div>

            <div class="card">
                <button onclick="doClearChecks()" style="width:100%; background:#eee; color:#666;">🧹 清空今日打卡</button>
            </div>

            <div class="card" style="font-size: 12px; color: #999; line-height: 1.6;">
                <strong>交互说明：</strong><br>
                1. 从下方拖动小球进入盒子<br>
                2. 盒子内已有小球时，新球会替换旧球，旧球自动退回池子<br>
                3. 盒子间不可互相拖动<br>
                4. 点击盒子内的小球完成打卡
            </div>
        </div>
    </div>

    <script>
        let db = {
            grid: JSON.parse(localStorage.getItem('fr_v6_g')) || Array(25).fill(""),
            active: JSON.parse(localStorage.getItem('fr_v6_a')) || [],
            sheets: JSON.parse(localStorage.getItem('fr_v6_s')) || [
                {name: '日常', tags: ["晒太阳", "多喝水", "深呼吸", "阅读10页", "冥想", "伸展运动"]},
                {name: '进阶', tags: ["整理房间", "不看手机1小时", "给朋友写信", "学习新技能"]}
            ],
            curIdx: 0,
            theme: localStorage.getItem('fr_v6_theme') || 'pink'
        };

        const save = () => {
            localStorage.setItem('fr_v6_g', JSON.stringify(db.grid));
            localStorage.setItem('fr_v6_a', JSON.stringify(db.active));
            localStorage.setItem('fr_v6_s', JSON.stringify(db.sheets));
            localStorage.setItem('fr_v6_theme', db.theme);
        };

        function init() {
            document.body.className = 'theme-' + db.theme;
            renderGrid(); renderSheets(); renderPool(); updateStats();
        }

        function renderGrid() {
            const size = parseInt(document.getElementById('sizeSel').value);
            const grid = document.getElementById('bingo-grid');
            grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            grid.innerHTML = "";

            db.grid.slice(0, size*size).forEach((txt, i) => {
                const box = document.createElement('div');
                box.className = `bingo-box ${db.active.includes(i) ? 'active' : ''}`;
                if(txt) {
                    const ball = document.createElement('div');
                    ball.className = "ball"; ball.innerText = txt;
                    ball.onclick = () => toggleCheck(i);
                    box.appendChild(ball);
                }
                grid.appendChild(box);

                new Sortable(box, {
                    group: { name: 'balls', put: true, pull: false }, // 禁止从格子往外拽（统一用归还功能）
                    onAdd: (evt) => {
                        if(box.children.length > 1) {
                            const old = Array.from(box.children).find(el => el !== evt.item);
                            db.sheets[db.curIdx].tags.push(old.innerText);
                            box.removeChild(old);
                        }
                        sync();
                    }
                });
            });
        }

        function renderPool() {
            const pool = document.getElementById('tag-pool');
            pool.innerHTML = "";
            db.sheets[db.curIdx].tags.forEach(txt => {
                const b = document.createElement('div');
                b.className = "ball"; b.style.width = "auto"; b.style.padding = "10px 15px";
                b.innerText = txt; pool.appendChild(b);
            });
            new Sortable(pool, { group: { name: 'balls', pull: 'clone' }, sort: true, onEnd: sync });
        }

        function sync() {
            const boxes = document.querySelectorAll('.bingo-box');
            db.grid = Array.from(boxes).map(b => b.querySelector('.ball')?.innerText || "");
            db.sheets[db.curIdx].tags = Array.from(document.querySelectorAll('#tag-pool .ball')).map(el => el.innerText);
            save(); renderGrid(); renderPool(); updateStats();
        }

        function doRandomChallenge() {
            const size = parseInt(document.getElementById('sizeSel').value);
            const totalCells = size * size;
            const allTags = [...db.sheets[db.curIdx].tags];
            
            if (allTags.length < totalCells / 2) {
                alert("池子里的小球太少啦，多添加几个再挑战吧！");
                return;
            }

            // 先撤回当前棋盘上的球
            db.grid.forEach(t => { if(t) db.sheets[db.curIdx].tags.push(t); });
            
            // 重新洗牌
            const shuffled = db.sheets[db.curIdx].tags.sort(() => Math.random() - 0.5);
            db.grid = Array(25).fill(""); 
            for(let i=0; i<totalCells; i++) {
                if(shuffled[i]) db.grid[i] = shuffled[i];
            }
            // 从池子中移除已上场的小球
            db.sheets[db.curIdx].tags = shuffled.slice(totalCells);
            
            db.active = [];
            save(); init();
            confetti({ particleCount: 50, spread: 60, origin: { y: 0.6 } });
        }

        function toggleCheck(i) {
            const idx = db.active.indexOf(i);
            if(idx > -1) db.active.splice(idx,1); else db.active.push(i);
            save(); renderGrid(); updateStats(); detectBingo();
        }

        function detectBingo() {
            const size = parseInt(document.getElementById('sizeSel').value);
            let bCount = 0;
            const has = (n) => db.active.includes(n) && db.grid[n];
            for(let i=0; i<size; i++) {
                let r=0, c=0;
                for(let j=0; j<size; j++){ if(has(i*size+j)) r++; if(has(j*size+i)) c++; }
                if(r===size) bCount++; if(c===size) bCount++;
            }
            if(bCount > parseInt(document.getElementById('bingo-val').innerText)) confetti({particleCount:100, origin:{y:0.7}});
            document.getElementById('bingo-val').innerText = bCount;
            updateStats();
        }

        function updateStats() {
            const filled = db.grid.filter(t=>t).length;
            const prog = filled ? Math.round(db.active.length/filled*100) : 0;
            document.getElementById('prog-val').innerText = prog + "%";
            const b = parseInt(document.getElementById('bingo-val').innerText);
            document.getElementById('m1').className = 'medal' + (b>=1?' unlocked':'');
            document.getElementById('m3').className = 'medal' + (b>=3?' unlocked':'');
            document.getElementById('mw').className = 'medal' + (filled > 0 && db.active.length===filled?' unlocked':'');
        }

        function recallAll() {
            db.grid.forEach(t => { if(t) db.sheets[db.curIdx].tags.push(t); });
            db.grid = Array(25).fill(""); db.active = [];
            save(); init();
        }

        function renderSheets() {
            const tabs = document.getElementById('sheet-tabs'); tabs.innerHTML = "";
            db.sheets.forEach((s, i) => {
                const t = document.createElement('button');
                t.className = `tab ${db.curIdx === i ? 'active' : ''}`;
                t.innerText = s.name; t.onclick = () => { db.curIdx = i; init(); };
                tabs.appendChild(t);
            });
        }

        function setTheme(c) { db.theme = c; save(); init(); }
        function addSheet() { const n = prompt("分类名:"); if(n) { db.sheets.push({name:n, tags:[]}); save(); init(); } }
        function addTag() { const v = document.getElementById('tagIn').value; if(v) { db.sheets[db.curIdx].tags.push(v); document.getElementById('tagIn').value=""; save(); renderPool(); } }
        function doClearChecks() { db.active = []; save(); renderGrid(); updateStats(); }
        function handleSizeChange() { db.active = []; db.grid = Array(25).fill(""); save(); init(); }

        init();
    </script>
</body>
</html>
