<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>人类丰容计划 - 工具版</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        /* 基础无美化样式 */
        body { font-family: sans-serif; padding: 20px; line-height: 1.5; color: #000; background: #fff; }
        h1 { border-bottom: 2px solid #000; padding-bottom: 10px; }
        
        .stats-bar { margin-bottom: 20px; font-weight: bold; border: 1px solid #000; padding: 10px; display: inline-block; }
        
        /* Bingo 棋盘样式 - 固定盒子 */
        .bingo-table { border-collapse: collapse; margin-bottom: 20px; table-layout: fixed; width: 500px; }
        .bingo-table td { 
            border: 2px solid #000; width: 100px; height: 100px; 
            text-align: center; vertical-align: middle; padding: 0; position: relative;
        }
        .bingo-table td.active { background-color: #ddd; }
        .bingo-table td.active::after { content: "[已打卡]"; display: block; font-size: 10px; margin-top: 5px; }

        /* 任务小球样式 */
        .task-item { 
            border: 1px solid #000; background: #fff; padding: 5px; 
            cursor: move; font-size: 13px; word-break: break-all;
            display: inline-block; margin: 2px;
        }
        .in-grid-task { width: 90%; display: block; margin: auto; }

        /* 任务池与分类样式 */
        .pool-section { border: 2px solid #000; padding: 15px; width: 100%; max-width: 800px; }
        .tabs { margin-bottom: 10px; border-bottom: 1px solid #000; }
        .tab-btn { border: 1px solid #000; border-bottom: none; padding: 5px 15px; cursor: pointer; background: #eee; margin-right: 5px; }
        .tab-btn.active { background: #fff; font-weight: bold; position: relative; top: 1px; }
        
        #tag-pool { min-height: 100px; border: 1px dashed #000; padding: 10px; margin-top: 10px; }
        
        .controls { margin-bottom: 10px; }
        button { border: 1px solid #000; background: #fff; padding: 5px 10px; cursor: pointer; }
        button:hover { background: #eee; }
        input { border: 1px solid #000; padding: 5px; }
    </style>
</head>
<body>

    <h1>🌿 人类丰容计划</h1>

    <div class="stats-bar">
        当前进度：<span id="prog-val">0%</span> | 
        Bingo连线：<span id="bingo-val">0</span>
    </div>

    <div class="controls">
        布局：<select id="sizeSel" onchange="handleSizeChange()">
            <option value="4">4 x 4</option>
            <option value="5" selected>5 x 5</option>
        </select>
        <button onclick="recallAllTasks()">↩️ 全部撤回池子</button>
        <button onclick="doClearCheck()">🧹 清空所有打卡</button>
    </div>

    <table class="bingo-table" id="bingo-grid">
        </table>

    <div class="pool-section">
        <div class="tabs" id="sheet-tabs">
            </div>
        <div>
            <input id="tagIn" type="text" placeholder="输入任务名称">
            <button onclick="doAddTag()">添加至当前池子</button>
            <button onclick="addSheet()">+ 新建分类</button>
        </div>
        <div id="tag-pool">
            </div>
    </div>

    <script>
        let db = {
            grid: JSON.parse(localStorage.getItem('fr_tool_g')) || Array(25).fill(""),
            active: JSON.parse(localStorage.getItem('fr_tool_a')) || [],
            sheets: JSON.parse(localStorage.getItem('fr_tool_s')) || [
                {name: '默认分类', tags: ["任务A", "任务B", "任务C"]}
            ],
            currentSheetIndex: 0
        };

        const save = () => {
            localStorage.setItem('fr_tool_g', JSON.stringify(db.grid));
            localStorage.setItem('fr_tool_a', JSON.stringify(db.active));
            localStorage.setItem('fr_tool_s', JSON.stringify(db.sheets));
        };

        function init() {
            renderGrid();
            renderSheets();
            renderPool();
            updateStats();
        }

        function renderGrid() {
            const size = parseInt(document.getElementById('sizeSel').value);
            const table = document.getElementById('bingo-grid');
            table.innerHTML = "";
            
            for (let r = 0; r < size; r++) {
                const tr = document.createElement('tr');
                for (let c = 0; c < size; c++) {
                    const idx = r * size + c;
                    const td = document.createElement('td');
                    if (db.active.includes(idx)) td.className = "active";
                    
                    const taskTxt = db.grid[idx];
                    if (taskTxt) {
                        const div = document.createElement('div');
                        div.className = "task-item in-grid-task";
                        div.innerText = taskTxt;
                        div.onclick = (e) => { e.stopPropagation(); toggleCheck(idx); };
                        td.appendChild(div);
                    }

                    // 将每个 td 设置为独立的容器
                    new Sortable(td, {
                        group: { name: 'tasks', put: true, pull: true },
                        animation: 0,
                        onAdd: function (evt) {
                            // 逻辑：如果盒子已有“球”，把旧的弹回池子
                            if (td.children.length > 1) {
                                const oldItem = Array.from(td.children).find(el => el !== evt.item);
                                if (oldItem) {
                                    db.sheets[db.currentSheetIndex].tags.push(oldItem.innerText);
                                    td.removeChild(oldItem);
                                }
                            }
                            syncAll();
                        },
                        onEnd: syncAll
                    });
                    tr.appendChild(td);
                }
                table.appendChild(tr);
            }
        }

        function renderPool() {
            const pool = document.getElementById('tag-pool');
            pool.innerHTML = "";
            db.sheets[db.currentSheetIndex].tags.forEach(txt => {
                const div = document.createElement('div');
                div.className = "task-item";
                div.innerText = txt;
                pool.appendChild(div);
            });

            new Sortable(pool, {
                group: { name: 'tasks', pull: 'clone', put: true },
                animation: 0,
                onEnd: syncAll
            });
        }

        function syncAll() {
            // 从DOM同步回数据
            const tds = document.querySelectorAll('#bingo-grid td');
            db.grid = Array.from(tds).map(td => {
                const item = td.querySelector('.task-item');
                return item ? item.innerText : "";
            });

            const poolItems = document.querySelectorAll('#tag-pool .task-item');
            db.sheets[db.currentSheetIndex].tags = Array.from(poolItems).map(el => el.innerText);
            
            save();
            renderGrid(); // 重新渲染确保格子位置固定
            updateStats();
        }

        function toggleCheck(idx) {
            const i = db.active.indexOf(idx);
            if (i > -1) db.active.splice(i, 1);
            else db.active.push(idx);
            save();
            renderGrid();
            updateStats();
        }

        function updateStats() {
            const size = parseInt(document.getElementById('sizeSel').value);
            const filled = db.grid.filter(t => t).length;
            const prog = filled ? Math.round((db.active.length / filled) * 100) : 0;
            document.getElementById('prog-val').innerText = prog + "%";
            
            // 简单Bingo检测
            let bingos = 0;
            const has = (i) => db.active.includes(i) && db.grid[i];
            // 行列检测
            for(let i=0; i<size; i++) {
                let row = true, col = true;
                for(let j=0; j<size; j++) {
                    if(!has(i*size+j)) row = false;
                    if(!has(j*size+i)) col = false;
                }
                if(row) bingos++; if(col) bingos++;
            }
            document.getElementById('bingo-val').innerText = bingos;
        }

        function recallAllTasks() {
            db.grid.forEach(t => { if(t) db.sheets[db.currentSheetIndex].tags.push(t); });
            db.grid = Array(25).fill("");
            db.active = [];
            save(); init();
        }

        function renderSheets() {
            const container = document.getElementById('sheet-tabs');
            container.innerHTML = "";
            db.sheets.forEach((s, i) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${db.currentSheetIndex === i ? 'active' : ''}`;
                btn.innerText = s.name;
                btn.onclick = () => { db.currentSheetIndex = i; init(); };
                container.appendChild(btn);
            });
        }

        function addSheet() {
            const n = prompt("分类名称:");
            if(n) { db.sheets.push({name: n, tags: []}); save(); init(); }
        }

        function doAddTag() {
            const input = document.getElementById('tagIn');
            if(input.value) {
                db.sheets[db.currentSheetIndex].tags.push(input.value);
                input.value = "";
                save(); renderPool();
            }
        }

        function doClearCheck() {
            db.active = [];
            save(); renderGrid(); updateStats();
        }

        function handleSizeChange() {
            db.active = [];
            db.grid = Array(25).fill("");
            save(); init();
        }

        init();
    </script>
</body>
</html>
